<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="A simple website layout with a hero section, container, and layout.">
    <meta name="keywords" content="HTML, CSS, website layout, hero section, container, responsive design">
    <meta name="author" content="Your Name">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body  class="bg-white text-black dark:bg-gray-900 dark:text-white" >

    <!--Header-->
 
    <header class="w-full top-0 left-0">
        <div class="bg-white h-16 mx-auto flex justify-between items-center
        px-6 sm:px-6 lg:px-8
        
        ">

        <!--Logo-->
            <div>CPP</div>

            <!--Desktop Menu-->
    
            <nav class="hidden md:block">
                <ul class="flex gap-6">
                 
                    <li><a href="">Personal Works</a></li>
                    <li><a href="">About</a></li>
                    <li><a href="">Experience</a></li>
                </ul>
            </nav>

            <div>

            

              <!-- Burger -->
              <button id="menu-btn" class="md:hidden text-2xl">
                ☰
            </button>

            <button id="theme-btn"
            class="text-xl">
        🌙
            </button>


            </div>

       
        </div>


        <!-- Mobile Menu -->
<div id="mobile-menu" class=" bg-gray-400 md:hidden overflow-hidden
 max-h-0 transition-all duration-300 bg-white ease-in-out">



<ul class="flex flex-col gap-4 p-4">

   <li><a href="#" class="block">Personal Works</a></li>
   <li><a href="#" class="block">About</a></li>
   <li><a href="#" class="block">Experience</a></li>

</ul>

</div>
    </header>



<script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const themeBtn = document.getElementById('theme-btn');
    
    let isOpen = false;
    
    /* BURGER MENU */
    menuBtn.addEventListener('click', () => {
    
        isOpen = !isOpen;
    
        if (isOpen) {
            mobileMenu.classList.remove('max-h-0');
            mobileMenu.classList.add('max-h-96');
            menuBtn.innerHTML = '✖';
        } else {
            mobileMenu.classList.remove('max-h-96');
            mobileMenu.classList.add('max-h-0');
            menuBtn.innerHTML = '☰';
        }
    
    });
    
    /* DARK MODE (SEPARATE - IMPORTANT) */
    themeBtn.addEventListener('click', () => {
    
        document.body.classList.toggle('bg-gray-900');
        document.body.classList.toggle('text-white');
    
    });
    </script>


    <section id="home" class="hero">
        <div>
            <h2>Personal Works</h2>
            <div>
                <h3>React.js</h3>
            </div>

            <div>
                <h3>Next.js</h3>
            </div>

            <div>

                <h3> SAAS</h3>
              
            
            </div>



        </div>


    </section>

    <section id="about" class="section">
        <h2>About</h2>
    </section>
    <footer> 
        <div>
            <p>&copy; 2026 CCP. All rights reserved.</p>
        </div>
    </footer>


    
    
</body>
</html>
